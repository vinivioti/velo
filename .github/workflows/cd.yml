# Workflow de Integração Contínua focado em execução de testes unitários
# Estrutura preparada para expansão futura (novos jobs, stages, etc.)

name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  # Versão do Node utilizada em todo o workflow
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: fernandopapito-4832s-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Executa os testes unitários com Vitest
      - name: Run unit tests
        run: yarn test
  
  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Obter as configurações do vercel
      - name: Pull Vercel Config
        run: |
          yarn vercel pull --yes \
          --environment=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE
      
      # 6. Build para o Vercel
      - name: Build Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN

      # 7. Deploy preview no vercel
      - name: Deploy preview
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --prebuilt \
          --target=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Instalação do Chromium
      - name: Install Plawright Browser
        run: yarn playwright install --with-deps chromium

      # 6. Execução dos Testes de Regressão
      - name: Run E2E Regression Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}

      # 7. Relatório de Testes Automatizados
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

  promote:
    name: Promote to Production
    needs: [build-and-deploy, e2e-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Vercel promote
        run: |
          npx vercel@latest promote ${{ needs.build-and-deploy.outputs.deployment-url }} \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE \
          --yes