name: Continuous Deployment

on:
  push:
    branches:
      - main
      - 'feature/*'

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: viniviotis-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install
      - run: yarn test

  build-and-deploy-preview:
    name: Build & Deploy Preview (Staging DB)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install

      # Sincroniza Banco de Staging (Aplica Migrations e Functions)
      - name: Sync Staging Database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase link --project-ref bsberzejqkpedpwvcmxi -p '${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}'
          npx supabase db push
          npx supabase functions deploy credit-analysis

      # Prepara Variáveis para o Build de Preview (Staging)
      - name: Pull Vercel Config (Preview)
        run: |
          yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE
          cp .vercel/.env.preview.local .env
      
      # Build Local para garantir injeção das variáveis e evitar página em branco
      - name: Build Project (Staging)
        run: yarn build

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          # Usamos a pasta dist gerada pelo build local
          URL=$(npx vercel deploy --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests (Against Preview)
    needs: [build-and-deploy-preview]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install
      - run: yarn playwright install --with-deps chromium
      
      # Criação explícita do .env de forma segura (evita erros com caracteres especiais na senha)
      - name: Create .env for E2E
        env:
          PREVIEW_DB_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
          PREVIEW_BASE_URL: ${{ needs.build-and-deploy-preview.outputs.deployment-url }}
        run: |
          echo "DATABASE_URL=$PREVIEW_DB_URL" > .env
          echo "BASE_URL=$PREVIEW_BASE_URL" >> .env
          echo "VITE_SUPABASE_URL=https://bsberzejqkpedpwvcmxi.supabase.co" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_dRElapK0uruf7O3is9U4lg_LzuyUjp2" >> .env

      - name: Run E2E Regression
        run: yarn playwright test

      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report
      
      - name: Publish Testdino Report
        if: always()
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TD_TOKEN }}

  deploy-production:
    name: Final Production Release
    if: github.ref == 'refs/heads/main'
    needs: [build-and-deploy-preview, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install
      
      # Prepara Variáveis Reais de Produção
      - name: Pull Vercel Config (Production)
        run: |
          yarn vercel pull --yes --environment=production --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE
          cp .vercel/.env.production.local .env
      
      # Build final com o banco de Produção
      - name: Build Project (Production)
        run: yarn build

      # Deploy final (O promote real)
      - name: Deploy to Vercel Production
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE
